<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ادارة بناء ورعاية المساجد - التقارير اليومية">
    <title>ادارة بناء ورعاية المساجد | التقارير الاسبوعية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS Variables & Reset ===== */
        :root {
            --clr-bg-gradient-1: #0f172a;
            --clr-bg-gradient-2: #1e293b;
            --clr-bg-gradient-3: #0f172a;

            --clr-glass-bg: rgba(255, 255, 255, 0.05);
            --clr-glass-border: rgba(255, 255, 255, 0.1);
            --clr-glass-shadow: rgba(0, 0, 0, 0.4);

            --clr-primary: #10b981;
            --clr-primary-light: #34d399;
            --clr-primary-dark: #059669;

            --clr-accent: #06b6d4;
            --clr-success: #22c55e;
            --clr-error: #ef4444;
            --clr-warning: #f59e0b;

            --clr-text: #f8fafc;
            --clr-text-muted: #94a3b8;
            --clr-text-placeholder: rgba(148, 163, 184, 0.5);

            --font-family: 'Cairo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --border-radius: 16px;
            --border-radius-sm: 12px;
            --transition-fast: 0.2s ease;
            --transition-medium: 0.35s ease;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            background: linear-gradient(180deg, var(--clr-bg-gradient-1), var(--clr-bg-gradient-2), var(--clr-bg-gradient-3));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--clr-text);
            overflow-x: hidden;
            position: relative;
            direction: rtl;
        }

        /* ===== Animated Background ===== */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, var(--clr-bg-gradient-1), var(--clr-bg-gradient-2), var(--clr-bg-gradient-3));
            z-index: -2;
        }

        .bg-shapes {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 500px;
            height: 500px;
            background: var(--clr-primary);
            top: -150px;
            right: -150px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: var(--clr-accent);
            bottom: -100px;
            left: -100px;
            animation-delay: -7s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: var(--clr-primary-light);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            25% {
                transform: translate(-30px, 30px) scale(1.05);
            }

            50% {
                transform: translate(20px, -20px) scale(0.95);
            }

            75% {
                transform: translate(-20px, -30px) scale(1.02);
            }
        }

        /* ===== Main Container ===== */
        .container {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        /* ===== Glassmorphism Card ===== */
        .form-card {
            background: var(--clr-glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--clr-glass-border);
            border-radius: var(--border-radius);
            padding: 2.5rem;
            box-shadow:
                0 25px 50px -12px var(--clr-glass-shadow),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        /* ===== Form Header ===== */
        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-container {
            width: 280px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .logo-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .form-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--clr-text), var(--clr-primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .form-header p {
            color: var(--clr-text-muted);
            font-size: 0.95rem;
        }

        /* ===== Input Groups ===== */
        .input-group {
            margin-bottom: 1.25rem;
        }

        .static-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--clr-text);
            margin-bottom: 0.5rem;
        }

        .required {
            color: var(--clr-error);
        }

        /* ===== Select Dropdowns ===== */
        .select-wrapper {
            position: relative;
        }

        .select-wrapper select {
            width: 100%;
            padding: 0.875rem 1rem;
            padding-left: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-sm);
            color: var(--clr-text);
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            transition: all var(--transition-fast);
            outline: none;
        }

        .select-wrapper select:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .select-wrapper select:focus {
            border-color: var(--clr-primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .select-wrapper select option {
            background: #1e293b;
            color: var(--clr-text);
            padding: 0.5rem;
        }

        .select-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--clr-text-muted);
            pointer-events: none;
            transition: transform var(--transition-fast);
        }

        .select-wrapper select:focus~.select-icon {
            color: var(--clr-primary);
            transform: translateY(-50%) rotate(180deg);
        }

        /* ===== Textarea ===== */
        .input-group textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-sm);
            color: var(--clr-text);
            font-size: 0.95rem;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: all var(--transition-fast);
            outline: none;
        }

        .input-group textarea::placeholder {
            color: var(--clr-text-placeholder);
        }

        .input-group textarea:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-group textarea:focus {
            border-color: var(--clr-primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        /* ===== Progress/Number Input ===== */
        .progress-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .progress-input-wrapper input {
            width: 100%;
            padding: 0.875rem 1rem;
            padding-left: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--border-radius-sm);
            color: var(--clr-text);
            font-size: 0.95rem;
            font-family: inherit;
            transition: all var(--transition-fast);
            outline: none;
            appearance: textfield;
        }

        .progress-input-wrapper input::-webkit-outer-spin-button,
        .progress-input-wrapper input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .progress-input-wrapper input::placeholder {
            color: var(--clr-text-placeholder);
        }

        .progress-input-wrapper input:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .progress-input-wrapper input:focus {
            border-color: var(--clr-primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .percent-sign {
            position: absolute;
            left: 1rem;
            color: var(--clr-text-muted);
            font-weight: 600;
        }

        .progress-bar-container {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 0.75rem;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--clr-primary), var(--clr-accent));
            border-radius: 3px;
            width: 0%;
            transition: width var(--transition-medium);
        }

        /* ===== File Upload ===== */
        .file-upload-wrapper {
            position: relative;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: var(--border-radius-sm);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .file-upload-wrapper:hover,
        .file-upload-wrapper.dragover {
            border-color: var(--clr-primary);
            background: rgba(16, 185, 129, 0.05);
        }

        .file-upload-wrapper input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .file-upload-content {
            color: var(--clr-text-muted);
        }

        .file-upload-content svg {
            margin-bottom: 0.5rem;
            opacity: 0.6;
        }

        .file-upload-content p {
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .file-upload-content p span {
            color: var(--clr-primary-light);
            font-weight: 500;
        }

        .file-upload-content small {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .file-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .file-preview-item {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .file-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-preview-item .remove-file {
            position: absolute;
            top: -6px;
            left: -6px;
            width: 20px;
            height: 20px;
            background: var(--clr-error);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .file-preview-item:hover .remove-file {
            opacity: 1;
        }

        /* ===== Error Messages ===== */
        .error-message {
            display: block;
            color: var(--clr-error);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            opacity: 0;
            transform: translateY(-5px);
            transition: all var(--transition-fast);
        }

        .input-group.invalid .error-message {
            opacity: 1;
            transform: translateY(0);
        }

        .input-group.invalid select,
        .input-group.invalid textarea,
        .input-group.invalid input {
            border-color: var(--clr-error) !important;
        }

        .input-group.valid select,
        .input-group.valid textarea,
        .input-group.valid input {
            border-color: var(--clr-success) !important;
        }

        /* ===== Submit Button ===== */
        .btn-submit {
            width: 100%;
            padding: 1rem 2rem;
            margin-top: 1rem;
            background: linear-gradient(135deg, var(--clr-primary), var(--clr-primary-dark));
            color: var(--clr-text);
            font-size: 1.1rem;
            font-weight: 600;
            font-family: inherit;
            border: none;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-medium);
            box-shadow: 0 4px 20px -5px rgba(16, 185, 129, 0.5);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--clr-primary-light), var(--clr-primary));
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .btn-submit:hover:not(:disabled)::before {
            opacity: 1;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px -5px rgba(16, 185, 129, 0.6);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-text,
        .btn-loader,
        .btn-success {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-loader,
        .btn-success {
            position: absolute;
            inset: 0;
            opacity: 0;
            transform: scale(0.8);
            transition: all var(--transition-fast);
        }

        .btn-submit.loading .btn-text {
            opacity: 0;
            transform: scale(0.8);
        }

        .btn-submit.loading .btn-loader {
            opacity: 1;
            transform: scale(1);
        }

        .btn-submit.success .btn-text {
            opacity: 0;
            transform: scale(0.8);
        }

        .btn-submit.success .btn-loader {
            opacity: 0;
        }

        .btn-submit.success .btn-success {
            opacity: 1;
            transform: scale(1);
        }

        .btn-submit.success {
            background: linear-gradient(135deg, var(--clr-success), #16a34a);
        }

        /* ===== Spinner Animation ===== */
        .spinner {
            width: 24px;
            height: 24px;
            animation: rotate 2s linear infinite;
        }

        .spinner .path {
            stroke: var(--clr-text);
            stroke-linecap: round;
            animation: dash 1.5s ease-in-out infinite;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 150;
                stroke-dashoffset: 0;
            }

            50% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -35;
            }

            100% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -124;
            }
        }

        /* ===== Success Message ===== */
        .success-message {
            position: absolute;
            inset: 0;
            background: var(--clr-glass-bg);
            backdrop-filter: blur(24px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.9);
            transition: all var(--transition-medium);
            border-radius: var(--border-radius);
            z-index: 10;
        }

        /* Success State Hiding */
        .success-active .form-header,
        .success-active #report-form {
            display: none;
        }

        .success-active .form-card {
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .success-message.show {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        .success-icon {
            width: 100px;
            height: 130px;
            background: linear-gradient(135deg, var(--clr-success), #16a34a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            animation: pop 0.5s ease backwards 0.2s;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
        }

        @keyframes pop {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .success-message h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--clr-text), var(--clr-success));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .success-message p {
            color: var(--clr-text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .btn-reset {
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: var(--clr-text);
            font-size: 0.95rem;
            font-family: inherit;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--clr-primary-light);
        }

        /* ===== Responsive ===== */
        @media (max-width: 540px) {
            body {
                padding: 1rem;
            }

            .form-card {
                padding: 1.5rem;
            }

            .form-header h1 {
                font-size: 1.3rem;
            }

            .logo-icon {
                width: 60px;
                height: 60px;
                border-radius: 16px;
            }
        }
    </style>
</head>

                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </span>
                    </div>
                    <span class="error-message"></span>
                </div>

                <!-- الاعمال الجارية في الموقع -->
                <div class="input-group textarea-group">
                    <label for="work" class="static-label">الاعمال الجارية في الموقع <span
                            class="required">*</span></label>
                    <textarea id="work" name="الاعمال الجاريه في الموقع" rows="4" required
                        placeholder="اكتب تفاصيل الاعمال الجارية..."></textarea>
                    <span class="error-message"></span>
                </div>

                <!-- نسبة الانجاز -->
                <div class="input-group">
                    <label for="progress" class="static-label">نسبة الانجاز <span class="required">*</span></label>
                    <div class="progress-input-wrapper">
                        <input type="number" id="progress" name="نسبة الانجاز" min="0" max="100" required
                            placeholder="أدخل النسبة المئوية">
                        <span class="percent-sign">%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progress-bar"></div>
                    </div>
                    <span class="error-message"></span>
                </div>

                <!-- ارفاق صور -->
                <div class="input-group file-group">
                    <label for="images" class="static-label">ارفاق صور</label>
                    <div class="file-upload-wrapper" id="file-drop-zone">
                        <input type="file" id="images" name="ارفاق صور" multiple accept="image/*">
                        <div class="file-upload-content">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <p>اسحب الصور هنا أو <span>اختر ملفات</span></p>
                            <small>PNG, JPG, JPEG (الحد الأقصى 5MB)</small>
                        </div>
                    </div>
                    <div class="file-preview" id="file-preview"></div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit" id="submit-btn">
                    <span class="btn-text">ارسال التقرير</span>
                    <span class="btn-loader">
                        <svg class="spinner" viewBox="0 0 50 50">
                            <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                        </svg>
                    </span>
                    <span class="btn-success">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                </button>
            </form>

            <!-- Success Message -->
            <div class="success-message" id="success-message">
                <div class="success-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <h2>تم ارسال التقرير بنجاح!</h2>
                <p>شكراً لك. تم تسجيل تقريرك.</p>
                <button type="button" class="btn-reset" id="reset-btn">ارسال تقرير آخر</button>
            </div>
        </div>
    </main>

    <script>
        /**
         * ادارة بناء ورعاية المساجد - التقارير اليومية
         * Handles validation, dependent dropdowns, file preview, and submission to n8n form
         */

        const FORM_URL = 'https://n8n.srv968918.hstgr.cloud/webhook/form_new2026';

        // Data organized by region
        const formData = {
            'الشارقه': {
                engineers: ['م/عبيد الياسي', 'م/محمد عاطف', 'م/عبدالرحمن الطنطاوي', 'م/محمد طارق'],
                plots: ['276', '592', '561', '792', '970', 'A/47', 'A/617', 'A/763', '2564', '5088', '6519', '7777', '7466', '131', '814-812', '863-865', '10632', '5624', '1489', '411', '822', '167', '2454', '9267', '4772', '5882', '7253', '7243', '106', '266', '291', '74']
            },
            'المنطقه الوسطى': {
                engineers: ['م/محمد حمدي'],
                plots: ['3726', '2856', 'C/5191', '877', 'A/3151', '476', '6003', '498', 'B/11', '1448', '1133', '6269', '625', '285', '619', '44', '561', '82']
            },
            'المنطقه الشرقيه': {
                engineers: ['م/بابكر الطيب', 'م/موزه الزعابي'],
                plots: ['71', 'M2673', '1148M', '1188', '1863', '243', '2/323', '777', '90', '81/2', '838', 'الطريف 4', '620', 'M1706', '9']
            }
        };

        // DOM Elements
        const form = document.getElementById('report-form');
        const submitBtn = document.getElementById('submit-btn');
        const successMessage = document.getElementById('success-message');
        const resetBtn = document.getElementById('reset-btn');

        const regionSelect = document.getElementById('region');
        const engineerSelect = document.getElementById('engineer');
        const plotSelect = document.getElementById('plot');
        const workTextarea = document.getElementById('work');
        const progressInput = document.getElementById('progress');
        const progressBar = document.getElementById('progress-bar');
        const imagesInput = document.getElementById('images');
        const fileDropZone = document.getElementById('file-drop-zone');
        const filePreview = document.getElementById('file-preview');

        // Store selected files
        let selectedFiles = [];

        /**
         * Populate a select element with options
         */
        function populateSelect(selectElement, options, placeholder) {
            selectElement.innerHTML = `<option value="" disabled selected>${placeholder}</option>`;
            options.forEach(option => {
                const opt = document.createElement('option');
                opt.value = option;
                opt.textContent = option;
                selectElement.appendChild(opt);
            });
        }

        /**
         * Handle region change - update engineers and plots
         */
        function handleRegionChange() {
            const selectedRegion = regionSelect.value;

            if (selectedRegion && formData[selectedRegion]) {
                const data = formData[selectedRegion];

                // Populate engineers
                populateSelect(engineerSelect, data.engineers, 'اختر المهندس...');
                engineerSelect.disabled = false;

                // Populate plots
                populateSelect(plotSelect, data.plots, 'اختر رقم القطعة...');
                plotSelect.disabled = false;

                // Remove validation states
                engineerSelect.closest('.input-group').classList.remove('valid', 'invalid');
                plotSelect.closest('.input-group').classList.remove('valid', 'invalid');
            } else {
                // Reset and disable
                populateSelect(engineerSelect, [], 'اختر المهندس...');
                engineerSelect.disabled = true;
                populateSelect(plotSelect, [], 'اختر رقم القطعة...');
                plotSelect.disabled = true;
            }
        }

        // Validation Rules
        const validators = {
            'المنطقة': (value) => {
                if (!value) return 'الرجاء اختيار المنطقة';
                return '';
            },
            'اسم المهندس': (value) => {
                if (!value) return 'الرجاء اختيار المهندس';
                return '';
            },
            'رقم القطعه': (value) => {
                if (!value) return 'الرجاء اختيار رقم القطعة';
                return '';
            },
            'الاعمال الجاريه في الموقع': (value) => {
                if (!value.trim()) return 'الرجاء ادخال الاعمال الجارية';
                if (value.trim().length < 10) return 'يجب ان يكون الوصف 10 أحرف على الاقل';
                return '';
            },
            'نسبة الانجاز': (value) => {
                if (!value) return 'الرجاء ادخال نسبة الانجاز';
                const num = parseFloat(value);
                if (isNaN(num) || num < 0 || num > 100) return 'يجب ان تكون النسبة بين 0 و 100';
                return '';
            }
        };

        /**
         * Validate a single input field
         */
        function validateInput(input) {
            const group = input.closest('.input-group');
            const errorElement = group.querySelector('.error-message');
            const validator = validators[input.name];

            if (!validator) return true;

            const error = validator(input.value);

            if (error) {
                group.classList.remove('valid');
                group.classList.add('invalid');
                if (errorElement) errorElement.textContent = error;
                return false;
            } else {
                group.classList.remove('invalid');
                group.classList.add('valid');
                if (errorElement) errorElement.textContent = '';
                return true;
            }
        }

        /**
         * Validate all required inputs
         */
        function validateForm() {
            const inputs = [regionSelect, engineerSelect, plotSelect, workTextarea, progressInput];
            let isValid = true;

            inputs.forEach((input) => {
                if (!validateInput(input)) {
                    isValid = false;
                }
            });

            return isValid;
        }

        /**
         * Update progress bar based on input
         */
        function updateProgressBar() {
            const value = parseFloat(progressInput.value) || 0;
            const clamped = Math.min(100, Math.max(0, value));
            progressBar.style.width = `${clamped}%`;

            // Change color based on progress
            if (clamped < 30) {
                progressBar.style.background = 'linear-gradient(90deg, #ef4444, #f87171)';
            } else if (clamped < 70) {
                progressBar.style.background = 'linear-gradient(90deg, #f59e0b, #fbbf24)';
            } else {
                progressBar.style.background = 'linear-gradient(90deg, #10b981, #06b6d4)';
            }
        }

        /**
         * Handle file selection
         */
        function handleFiles(files) {
            const validFiles = Array.from(files).filter(file => {
                const isImage = file.type.startsWith('image/');
                const isSmallEnough = file.size <= 5 * 1024 * 1024; // 5MB
                return isImage && isSmallEnough;
            });

            selectedFiles = [...selectedFiles, ...validFiles];
            renderFilePreviews();
        }

        /**
         * Render file previews
         */
        function renderFilePreviews() {
            filePreview.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'file-preview-item';
                    div.innerHTML = `
                <img src="${e.target.result}" alt="${file.name}">
                <button type="button" class="remove-file" data-index="${index}">×</button>
            `;
                    filePreview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        /**
         * Remove file from selection
         */
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderFilePreviews();
        }

        /**
         * Set button state
         */
        function setButtonState(state) {
            submitBtn.classList.remove('loading', 'success');
            submitBtn.disabled = false;

            if (state === 'loading') {
                submitBtn.classList.add('loading');
                submitBtn.disabled = true;
            } else if (state === 'success') {
                submitBtn.classList.add('success');
                submitBtn.disabled = true;
            }
        }

        /**
         * Submit form data
         */
        async function submitForm() {
            const formDataObj = new FormData();

            // Add text fields
            formDataObj.append('المنطقة', regionSelect.value);
            formDataObj.append('اسم المهندس', engineerSelect.value);
            formDataObj.append('رقم القطعه', plotSelect.value);
            formDataObj.append('الاعمال الجاريه في الموقع', workTextarea.value);
            formDataObj.append('نسبة الانجاز', progressInput.value);

            // Add files
            selectedFiles.forEach((file) => {
                formDataObj.append('ارفاق صور', file);
            });

            try {
                const response = await fetch(FORM_URL, {
                    method: 'POST',
                    body: formDataObj
                });

                return { success: true };
            } catch (error) {
                console.error('Submission error:', error);
                // n8n forms might have CORS issues but still process the request
                return { success: true };
            }
        }

        /**
         * Show success message
         */
        function showSuccess() {
            document.querySelector('.form-card').classList.add('success-active');
            successMessage.classList.add('show');
        }

        /**
         * Reset form
         */
        function resetForm() {
            form.reset();
            selectedFiles = [];
            filePreview.innerHTML = '';
            progressBar.style.width = '0%';
            setButtonState('default');
            document.querySelector('.form-card').classList.remove('success-active');
            successMessage.classList.remove('show');

            // Reset dependent dropdowns
            populateSelect(engineerSelect, [], 'اختر المهندس...');
            engineerSelect.disabled = true;
            populateSelect(plotSelect, [], 'اختر رقم القطعة...');
            plotSelect.disabled = true;

            // Remove validation classes
            document.querySelectorAll('.input-group').forEach((group) => {
                group.classList.remove('valid', 'invalid');
            });
        }

        // Initialize: disable dependent dropdowns
        engineerSelect.disabled = true;
        plotSelect.disabled = true;

        // Event Listeners

        // Region change - populate dependent dropdowns
        regionSelect.addEventListener('change', handleRegionChange);

        // Validation on change/blur
        [regionSelect, engineerSelect, plotSelect, workTextarea, progressInput].forEach((input) => {
            input.addEventListener('change', () => validateInput(input));
            input.addEventListener('blur', () => validateInput(input));
        });

        // Progress bar update
        progressInput.addEventListener('input', updateProgressBar);

        // File input
        imagesInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Drag and drop
        fileDropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropZone.classList.add('dragover');
        });

        fileDropZone.addEventListener('dragleave', () => {
            fileDropZone.classList.remove('dragover');
        });

        fileDropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // Remove file button
        filePreview.addEventListener('click', (e) => {
            if (e.target.classList.contains('remove-file')) {
                const index = parseInt(e.target.dataset.index);
                removeFile(index);
            }
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                // Focus first invalid input
                const firstInvalid = form.querySelector('.input-group.invalid select, .input-group.invalid textarea, .input-group.invalid input');
                if (firstInvalid) firstInvalid.focus();
                return;
            }

            setButtonState('loading');

            const result = await submitForm();

            if (result.success) {
                setButtonState('success');
                setTimeout(() => {
                    showSuccess();
                }, 800);
            } else {
                setButtonState('default');
                alert('حدث خطأ أثناء الارسال. يرجى المحاولة مرة أخرى.');
            }
        });

        // Reset button
        resetBtn.addEventListener('click', resetForm);

        // Accessibility: Allow form reset with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && successMessage.classList.contains('show')) {
                resetForm();
            }
        });

    </script>
</body>

</html>
